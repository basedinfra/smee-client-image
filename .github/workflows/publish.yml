name: Publish image

on:
    pull_request:
    push:
        branches:
            - main
        tags:
            - 'v*'
            - '*.*.*-baseinfra*'

permissions:
    contents: read
    packages: write

env:
    IMAGE_NAME: ghcr.io/basedinfra/smee-client

jobs:
    docker:
        name: Build image
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Prepare image tags
              id: tags
              shell: bash
              run: |
                  image_version="$(node -p "require('./package.json').version")"
                  image_minor="$(node -p "const version = require('./package.json').version.split('.'); version[0] + '.' + version[1]")"
                  short_sha="${GITHUB_SHA::7}"
                  {
                    echo "tags<<EOF"
                    echo "${IMAGE_NAME}:${image_version}"
                    echo "${IMAGE_NAME}:${image_minor}"
                    echo "${IMAGE_NAME}:sha-${short_sha}"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Build and publish image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.tags.outputs.tags }}
